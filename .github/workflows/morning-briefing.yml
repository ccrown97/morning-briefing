name: Morning Briefing

on:
  schedule:
    # 06:30 CEST (UTC+2, Sommerzeit) = 04:30 UTC
    # Winter (CET = UTC+1): läuft um 05:30 MEZ → ggf. auf '30 5 * * *' ändern
    - cron: '30 4 * * *'
  workflow_dispatch:   # Manueller Test: GitHub → Actions → Run workflow

jobs:
  send-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Morning Briefing ausführen
        env:
          CALLMEBOT_KEY:          ${{ secrets.CALLMEBOT_KEY }}
          CALLMEBOT_PHONE:        ${{ secrets.CALLMEBOT_PHONE }}
          GEMINI_API_KEY:         ${{ secrets.GEMINI_API_KEY }}
          TICKTICK_ACCESS_TOKEN:  ${{ secrets.TICKTICK_ACCESS_TOKEN }}
        run: python briefing.py
